<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XLII — Review All Abouts</title>
  <link rel="apple-touch-icon" href="/icon-180.png">
  <link rel="icon" href="/favicon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Review Abouts">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #1a1a1a;
      color: #e0d8c8;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.4rem;
      color: #c4a35a;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 24px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .tab {
      padding: 8px 16px;
      background: #2a2a2a;
      border: 1px solid #444;
      color: #aaa;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }
    .tab:hover { border-color: #c4a35a; color: #c4a35a; }
    .tab.active {
      background: #c4a35a;
      color: #1a1a1a;
      border-color: #c4a35a;
      font-weight: bold;
    }
    .collection-header {
      font-size: 1.1rem;
      color: #c4a35a;
      border-bottom: 1px solid #444;
      padding-bottom: 8px;
      margin: 32px 0 16px;
      letter-spacing: 1px;
    }
    .show-count {
      color: #888;
      font-size: 0.8rem;
      font-weight: normal;
    }
    .show {
      background: #222;
      border: 1px solid #333;
      margin-bottom: 16px;
      padding: 16px;
    }
    .show-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 4px;
    }
    .show-date {
      font-size: 1rem;
      color: #c4a35a;
      font-weight: bold;
    }
    .show-venue {
      font-size: 0.85rem;
      color: #999;
    }
    .show-review {
      font-size: 0.82rem;
      line-height: 1.6;
      color: #d4cbb8;
      white-space: pre-wrap;
    }
    .show.flagged { border: 4px double #e0d8c8; }
    .flag-bar {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
      gap: 8px;
    }
    .flag-btn {
      font-family: inherit;
      font-size: 0.75rem;
      padding: 4px 10px;
      cursor: pointer;
      background: #2a2a2a;
      border: 1px solid #555;
      color: #aaa;
    }
    .flag-btn:hover { border-color: #c4a35a; color: #c4a35a; }
    .flag-btn.flagged-btn { background: #555; color: #fff; border-color: #888; }
    .listen-btn {
      font-family: inherit; font-size: 0.75rem; padding: 4px 10px;
      cursor: pointer; background: #2a2a2a; border: 1px solid #555; color: #aaa;
    }
    .listen-btn:hover { border-color: #c4a35a; color: #c4a35a; }
    .listen-btn.speaking { background: #c4a35a; color: #1a1a1a; border-color: #c4a35a; }
    .star-btn {
      font-family: inherit; font-size: 0.75rem; padding: 4px 10px;
      cursor: pointer; background: #2a2a2a; border: 1px solid #555; color: #aaa;
    }
    .star-btn:hover { border-color: #c4a35a; color: #c4a35a; }
    .star-btn.starred { background: #c4a35a; color: #1a1a1a; border-color: #c4a35a; }
    .show.reviewed { opacity: 0.3; }
    .show.reviewed:hover { opacity: 0.7; }
    .show.reviewed .show-review { max-height: 40px; overflow: hidden; }
    .show.reviewed:hover .show-review { max-height: none; }
    .flag-form {
      margin-top: 10px;
      border-top: 1px solid #333;
      padding-top: 10px;
    }
    .flag-note {
      width: 100%;
      font-family: inherit;
      font-size: 0.8rem;
      background: #1a1a1a;
      border: 1px solid #555;
      color: #e0d8c8;
      padding: 8px;
      margin-top: 6px;
      resize: vertical;
      min-height: 50px;
    }
    .flag-note::placeholder { color: #666; }
    .flag-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 0.8rem;
      color: #aaa;
    }
    .flag-checkbox input { width: 16px; height: 16px; accent-color: #c4a35a; }
    .flag-saved-note {
      margin-top: 8px;
      padding: 8px;
      background: #1a1a1a;
      border: 1px solid #444;
      font-size: 0.8rem;
      color: #aaa;
    }
    .flag-saved-note .note-label { color: #c4a35a; font-size: 0.7rem; margin-bottom: 4px; }
    .flag-saved-note .archive-tag {
      display: inline-block;
      border: 1px solid #888;
      padding: 1px 6px;
      font-size: 0.7rem;
      color: #888;
      margin-top: 4px;
    }
    .stats {
      text-align: center;
      color: #888;
      font-size: 0.8rem;
      margin-bottom: 20px;
    }
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .filter-btn {
      font-family: inherit;
      font-size: 0.75rem;
      padding: 4px 12px;
      cursor: pointer;
      background: #2a2a2a;
      border: 1px solid #555;
      color: #aaa;
    }
    .filter-btn:hover { border-color: #c4a35a; }
    .filter-btn.active { background: #aa4444; color: #fff; border-color: #aa4444; }
    .summary-bar {
      text-align: center;
      background: #2a2a2a;
      border: 1px solid #444;
      padding: 10px;
      margin-bottom: 20px;
      font-size: 0.8rem;
      color: #aaa;
    }
    .summary-bar strong { color: #aa4444; }
    @media (max-width: 600px) {
      body { padding: 12px; }
      .show { padding: 12px; }
      .show-header { flex-direction: column; }
    }
  </style>
</head>
<body>
  <h1>XLII — SHOW ABOUTS</h1>
  <div class="subtitle">Review all show descriptions by collection</div>
  <div class="stats" id="stats"></div>
  <div class="tabs" id="tabs"></div>
  <div class="filter-bar">
    <button class="filter-btn" id="filter-all" onclick="setFilter('all')">ALL</button>
    <button class="filter-btn" id="filter-flagged" onclick="setFilter('flagged')">FLAGGED ONLY</button>
    <button class="filter-btn" onclick="shareLocation()" style="margin-left:auto">SHARE LINK</button>
  </div>
  <div class="summary-bar" id="summary-bar" style="display:none"></div>
  <div id="content"></div>

  <script>
    function shareLocation() {
      const url = window.location.href;
      if (navigator.share) {
        navigator.share({ title: 'XLII — Review Abouts', url: url });
      } else {
        navigator.clipboard.writeText(url).then(() => {
          const btn = event.target;
          btn.textContent = 'COPIED!';
          setTimeout(() => { btn.textContent = 'SHARE LINK'; }, 1500);
        });
      }
    }

    const SUPABASE_URL = 'https://dhwllgdxpeucldtmzhme.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRod2xsZ2R4cGV1Y2xkdG16aG1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyMzI2NTMsImV4cCI6MjA4NTgwODY1M30.PmDxpoWXP0zA2sJLgRxAfODH1JcjdFOoRMdnGZwJYLE';

    let shows = [];
    let flagged = JSON.parse(localStorage.getItem('xlii-flagged') || '{}');
    let starred = JSON.parse(localStorage.getItem('xlii-starred') || '{}');
    let activeTab = 'all';
    let activeFilter = 'all';
    let dbReady = false;
    let currentUtterance = null;
    let speakingDate = null;

    const COLLECTION_NAMES = {
      cornell_and_company: 'CORNELL AND COMPANY',
      wall_of_sound: 'WALL OF SOUND',
      young_bettys: 'YOUNG BETTYS',
      new_animal: 'NEW ANIMAL'
    };

    const COLLECTION_ORDER = ['cornell_and_company', 'wall_of_sound', 'young_bettys', 'new_animal'];

    async function init() {
      const res = await fetch('reviews.json');
      shows = await res.json();
      document.getElementById('stats').textContent = shows.length + ' shows total';

      // Load from DB, merge with localStorage (localStorage wins for conflicts)
      const dbData = await loadFromDb();
      if (dbData.flags) {
        for (const [date, data] of Object.entries(dbData.flags)) {
          if (!flagged[date]) flagged[date] = data;
        }
      }
      if (dbData.stars) {
        for (const [date, val] of Object.entries(dbData.stars)) {
          if (!starred[date]) starred[date] = val;
        }
      }
      // Sync all local flags up to DB
      await syncLocalToDb();
      localStorage.setItem('xlii-flagged', JSON.stringify(flagged));
      localStorage.setItem('xlii-starred', JSON.stringify(starred));
      dbReady = true;

      renderTabs();
      render();
    }

    function renderTabs() {
      const tabs = document.getElementById('tabs');
      const allTab = `<button class="tab ${activeTab === 'all' ? 'active' : ''}" onclick="setTab('all')">ALL (${shows.length})</button>`;
      const collTabs = COLLECTION_ORDER.map(c => {
        const count = shows.filter(s => (s.cases || []).includes(c)).length;
        return `<button class="tab ${activeTab === c ? 'active' : ''}" onclick="setTab('${c}')">${COLLECTION_NAMES[c]} (${count})</button>`;
      }).join('');
      tabs.innerHTML = allTab + collTabs;
    }

    function setTab(tab) {
      activeTab = tab;
      renderTabs();
      render();
    }

    function setFilter(f) {
      activeFilter = f;
      document.getElementById('filter-all').className = 'filter-btn' + (f === 'all' ? ' active' : '');
      document.getElementById('filter-flagged').className = 'filter-btn' + (f === 'flagged' ? ' active' : '');
      render();
    }

    function toggleFlag(date) {
      if (flagged[date]) {
        delete flagged[date];
        if (dbReady) deleteFromDb(date);
      } else {
        flagged[date] = { note: '', archiveOrg: false };
        if (dbReady) saveToDb(date, flagged[date]);
      }
      localStorage.setItem('xlii-flagged', JSON.stringify(flagged));
      updateSummary();
      render();
    }

    function saveNote(date) {
      if (!flagged[date]) return;
      const noteEl = document.getElementById('note-' + date);
      const checkEl = document.getElementById('archive-' + date);
      if (noteEl) flagged[date].note = noteEl.value;
      if (checkEl) flagged[date].archiveOrg = checkEl.checked;
      localStorage.setItem('xlii-flagged', JSON.stringify(flagged));
      if (dbReady) saveToDb(date, flagged[date]);
    }

    // Migrate old boolean flags to new format
    for (const [k, v] of Object.entries(flagged)) {
      if (v === true) flagged[k] = { note: '', archiveOrg: false };
    }
    localStorage.setItem('xlii-flagged', JSON.stringify(flagged));

    async function sbFetch(path, opts = {}) {
      const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
        ...opts,
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': opts.prefer || 'return=minimal',
          ...(opts.headers || {})
        }
      });
      if (!res.ok) throw new Error(await res.text());
      if (opts.prefer === 'return=representation' || opts.method === undefined)
        return res.json().catch(() => null);
      return null;
    }

    async function loadFromDb() {
      try {
        const rows = await sbFetch('xlii_review_flags?select=*');
        if (!rows || rows.length === 0) return { flags: {}, stars: {} };
        const dbFlags = {};
        const dbStars = {};
        for (const r of rows) {
          if (r.flagged) {
            dbFlags[r.date] = { note: r.note || '', archiveOrg: r.archive_org || false };
          }
          if (r.gold_star) {
            dbStars[r.date] = true;
          }
        }
        return { flags: dbFlags, stars: dbStars };
      } catch (e) {
        console.error('DB load failed:', e);
        return { flags: {}, stars: {} };
      }
    }

    async function saveToDb(date, data) {
      try {
        await sbFetch('xlii_review_flags', {
          method: 'POST',
          body: JSON.stringify({
            date,
            note: data.note || '',
            archive_org: data.archiveOrg || false,
            flagged: true,
            updated_at: new Date().toISOString()
          }),
          headers: { 'Prefer': 'resolution=merge-duplicates' },
          prefer: 'return=minimal'
        });
      } catch (e) { console.error('DB save failed:', e); }
    }

    async function deleteFromDb(date) {
      try {
        await sbFetch('xlii_review_flags?date=eq.' + date, { method: 'DELETE' });
      } catch (e) { console.error('DB delete failed:', e); }
    }

    async function syncLocalToDb() {
      for (const [date, data] of Object.entries(flagged)) {
        await saveToDb(date, data);
      }
    }

    // --- LISTEN (text-to-speech) ---
    function listenTo(date) {
      if (speakingDate === date && speechSynthesis.speaking) {
        speechSynthesis.cancel();
        speakingDate = null;
        render();
        return;
      }
      speechSynthesis.cancel();
      const show = shows.find(s => s.date === date);
      if (!show || !show.review) return;
      const text = show.review.toLowerCase().replace(/\b([a-z])/g, (m, c) => c.toUpperCase());
      const utt = new SpeechSynthesisUtterance(text);
      utt.rate = 1.1;
      utt.onend = () => { speakingDate = null; render(); };
      utt.onerror = () => { speakingDate = null; render(); };
      speakingDate = date;
      speechSynthesis.speak(utt);
      render();
    }

    // --- GOLD STAR ---
    function toggleStar(date) {
      if (starred[date]) {
        delete starred[date];
        deleteStarFromDb(date);
      } else {
        starred[date] = true;
        saveStarToDb(date);
      }
      localStorage.setItem('xlii-starred', JSON.stringify(starred));
      render();
    }

    async function saveStarToDb(date) {
      try {
        await sbFetch('xlii_review_flags', {
          method: 'POST',
          body: JSON.stringify({ date, note: starred[date] ? (flagged[date]?.note || '') : '', archive_org: flagged[date]?.archiveOrg || false, flagged: !!flagged[date], gold_star: true, updated_at: new Date().toISOString() }),
          headers: { 'Prefer': 'resolution=merge-duplicates' },
          prefer: 'return=minimal'
        });
      } catch (e) { console.error('Star save failed:', e); }
    }

    async function deleteStarFromDb(date) {
      try {
        // Update the row to remove gold_star, don't delete the row (might have flags)
        await sbFetch('xlii_review_flags?date=eq.' + date, {
          method: 'PATCH',
          body: JSON.stringify({ gold_star: false, updated_at: new Date().toISOString() }),
          prefer: 'return=minimal'
        });
      } catch (e) { console.error('Star delete failed:', e); }
    }

    // --- GRAY OUT REVIEWED ---
    function getLastFlaggedDate(showList) {
      let lastIdx = -1;
      for (let i = 0; i < showList.length; i++) {
        if (flagged[showList[i].date] || starred[showList[i].date]) lastIdx = i;
      }
      return lastIdx;
    }

    function updateSummary() {
      const bar = document.getElementById('summary-bar');
      const count = Object.keys(flagged).length;
      if (count === 0) {
        bar.style.display = 'none';
      } else {
        bar.style.display = 'block';
        bar.innerHTML = `<strong>${count}</strong> show${count === 1 ? '' : 's'} flagged for revision`;
      }
    }

    function renderShow(s, isReviewed) {
      const flagData = flagged[s.date];
      const isFlagged = !!flagData;
      const isStarred = !!starred[s.date];
      const isSpeaking = speakingDate === s.date;
      const note = flagData ? (flagData.note || '') : '';
      const isArchive = flagData ? (flagData.archiveOrg || false) : false;

      let flagSection = '';
      if (isFlagged) {
        flagSection = `
          <div class="flag-form">
            <label class="flag-checkbox">
              <input type="checkbox" id="archive-${s.date}" ${isArchive ? 'checked' : ''} onchange="saveNote('${s.date}')">
              Just archive.org comments — needs real research
            </label>
            <textarea class="flag-note" id="note-${s.date}" placeholder="Optional note..." onblur="saveNote('${s.date}')">${escapeHtml(note)}</textarea>
          </div>
        `;
      }

      const reviewedClass = isReviewed ? ' reviewed' : '';

      return `
        <div class="show ${isFlagged ? 'flagged' : ''}${isStarred ? ' starred' : ''}${reviewedClass}">
          <div class="show-header">
            <span class="show-date">${isStarred ? '⭐ ' : ''}${s.date}</span>
            <span class="show-venue">${s.venue_name || ''}${s.city ? ', ' + s.city : ''}${s.state ? ', ' + s.state : ''}</span>
          </div>
          <div class="show-review">${escapeHtml(s.review || '(no review)')}</div>
          <div class="flag-bar">
            <button class="listen-btn ${isSpeaking ? 'speaking' : ''}" onclick="listenTo('${s.date}')">
              ${isSpeaking ? '■ STOP' : '▶ LISTEN'}
            </button>
            <button class="star-btn ${isStarred ? 'starred' : ''}" onclick="toggleStar('${s.date}')">
              ${isStarred ? '⭐ GOLD STAR' : '☆ GOLD STAR'}
            </button>
            <button class="flag-btn ${isFlagged ? 'flagged-btn' : ''}" onclick="toggleFlag('${s.date}')">
              ${isFlagged ? '✕ UNFLAG' : '⚑ FLAG'}
            </button>
          </div>
          ${flagSection}
        </div>
      `;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderShowList(showList) {
      const lastIdx = getLastFlaggedDate(showList);
      return showList.map((s, i) => renderShow(s, i < lastIdx)).join('');
    }

    function render() {
      const content = document.getElementById('content');
      let filtered = shows;

      if (activeTab !== 'all') {
        filtered = filtered.filter(s => (s.cases || []).includes(activeTab));
      }

      if (activeFilter === 'flagged') {
        filtered = filtered.filter(s => flagged[s.date] || starred[s.date]);
      }

      if (activeTab !== 'all') {
        filtered.sort((a, b) => a.date.localeCompare(b.date));
        content.innerHTML = renderShowList(filtered);
      } else {
        let html = '';
        for (const c of COLLECTION_ORDER) {
          const collShows = filtered.filter(s => (s.cases || []).includes(c));
          if (collShows.length === 0) continue;
          collShows.sort((a, b) => a.date.localeCompare(b.date));
          html += `<div class="collection-header">${COLLECTION_NAMES[c]} <span class="show-count">(${collShows.length} shows)</span></div>`;
          html += renderShowList(collShows);
        }
        content.innerHTML = html;
      }

      updateSummary();
    }

    init();
  </script>
</body>
</html>
